<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 30" role="img" aria-label="Citadele">
  <rect width="48" height="30" rx="3" fill="#FFFFFF"/>
  <rect width="48" height="30" rx="3" fill="none" stroke="#DDDDDD" stroke-width="1"/>
  <!-- Citadele brand mark: red C-bracket (vertical bar + top + bottom) -->
