  <rect x="4"   y="6"    width="11" height="3.5"  rx="1.2" fill="#D80828"/>
  <rect x="4"   y="20.5" width="11" height="3.5"  rx="1.2" fill="#D80828"/>
  <text x="33" y="19" font-family="Arial,Helvetica,sans-serif" font-size="7" font-weight="700" fill="#251435" text-anchor="middle" letter-spacing="0.1">citadele</text>
</svg>
